name: gatewise
description: "Smart Railway Gate Status & Route Decision App - Industry level product with clean UI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  location: ^5.0.3
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Firebase (optional, can be disabled)
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  
  # HTTP & API
  http: ^1.1.2
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  flutter_polyline_points: 3.1.0
  permission_handler: ^11.1.0
  intl: ^0.18.1
  shimmer: ^3.0.0
  
  # Utilities
  get_it: ^7.6.4
  equatable: ^2.0.5
  logger: ^2.0.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
